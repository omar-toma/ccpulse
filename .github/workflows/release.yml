name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: npm install -g npm@11.5.1 --force  # Trusted Publishing requires npm >= 11.5.1
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match packages/cli version $PKG" >&2
            exit 1
          fi
      - run: pnpm build
      - name: Publish (Trusted Publishing via OIDC)
        working-directory: packages/cli
        run: npm publish --provenance --access public
